# Docker Compose override for standalone self-signed SSL mode
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d
#   make ssl

services:
  nginx:
    ports:
      - "${DOCKERCART_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/ssl:/etc/ssl/dockercart:ro
      - ./docker/nginx/ssl/dockercart.selfsigned.conf:/etc/nginx/conf.d/dockercart.ssl.conf:ro
