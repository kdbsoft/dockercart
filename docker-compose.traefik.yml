services:
  nginx:
    image: nginx:alpine
    container_name: ${NGINX_CONTAINER_NAME:-dockercart_nginx}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./upload:/var/www/html:ro
      - ./storage:/var/www/storage:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro,z
      - ./docker/nginx/cache:/var/cache/nginx:Z
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${DOCKERCART_ROUTER_NAME:-dockercart}.rule=Host(`${DOCKERCART_DOMAIN:-dockercart.local}`)"
      - "traefik.http.routers.${DOCKERCART_ROUTER_NAME:-dockercart}.entrypoints=web"
      - "traefik.http.services.${DOCKERCART_ROUTER_NAME:-dockercart}.loadbalancer.server.port=80"
    depends_on:
      - apache
    networks:
      - dockercart-network
      - traefik
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  apache:
    build:
      context: .
      dockerfile: Dockerfile
    image: dockercart_apache:latest
    container_name: ${APACHE_CONTAINER_NAME:-dockercart_apache}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # No ports exposed - Nginx handles external connections
    volumes:
      - ./upload:/var/www/html:z
      - ./storage:/var/www/storage:z
      - ./VERSION:/var/www/VERSION:ro,z
      - ./docker/mysql/init.sql:/opt/dockercart-seed/init.sql:ro,z
      - ./composer.json:/var/www/composer.json:ro,z
      - ./composer.lock:/var/www/composer.lock:ro,z
      - ./.git/info/exclude:/var/www/git-exclude:z
    environment:
      - DB_HOSTNAME=${DB_HOSTNAME:-mariadb}
      - DB_USERNAME=${DB_USERNAME:-dockercart}
      - DB_PASSWORD=${DB_PASSWORD:-dockercart_password}
      - DB_DATABASE=${DB_DATABASE:-dockercart}
      - DB_PORT=${DB_PORT:-3306}
      - DB_PREFIX=${DB_PREFIX:-oc_}
      - DOCKERCART_URL=${DOCKERCART_URL:-http://dockercart.local}
      - DOCKERCART_HTTPS_URL=${DOCKERCART_HTTPS_URL:-http://dockercart.local}
      - DOCKERCART_SSL_ENABLED=${DOCKERCART_SSL_ENABLED:-false}
      - DOCKERCART_DOMAIN=${DOCKERCART_DOMAIN:-dockercart.local}
      - DOCKERCART_CUSTOM_ORDERS_XML_SECRET=${DOCKERCART_CUSTOM_ORDERS_XML_SECRET:-}
      - HEALTHCHECK_TOKEN=${HEALTHCHECK_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - CACHE_ENGINE=${CACHE_ENGINE:-redis}
      - REDIS_HOSTNAME=${REDIS_HOSTNAME:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dockercart_redis_pass}
      - CACHE_PREFIX=${CACHE_PREFIX:-oc_}
      - TZ=${TZ:-UTC}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-100M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-100M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - GIT_EXCLUDE_FILE=${GIT_EXCLUDE_FILE:-/var/www/git-exclude}
      # Backup to S3 (optional; worker reads these to dump+tar+upload)
      - BACKUP_S3_ENABLED=${BACKUP_S3_ENABLED:-false}
      - BACKUP_S3_PROVIDER=${BACKUP_S3_PROVIDER:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_REGION=${BACKUP_S3_REGION:-}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY_ID:-}
      - BACKUP_S3_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_ACCESS_KEY:-}
      - BACKUP_S3_PATH=${BACKUP_S3_PATH:-dockercart/backups}
      - BACKUP_S3_RETENTION_DAYS=${BACKUP_S3_RETENTION_DAYS:-7}
      - BACKUP_S3_INSECURE=${BACKUP_S3_INSECURE:-false}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dockercart-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: dockercart_apache:latest
    container_name: ${SCHEDULER_CONTAINER_NAME:-dockercart_scheduler}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    mem_limit: ${SCHEDULER_MEM_LIMIT:-512M}
    cpus: ${SCHEDULER_CPUS:-1.0}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./upload:/var/www/html:z
      - ./storage:/var/www/storage:z
      - ./VERSION:/var/www/VERSION:ro,z
      - ./docker/mysql/init.sql:/opt/dockercart-seed/init.sql:ro,z
      - ./composer.json:/var/www/composer.json:ro,z
      - ./composer.lock:/var/www/composer.lock:ro,z
    environment:
      - DOCKERCART_ROLE=scheduler
      - DB_HOSTNAME=${DB_HOSTNAME:-mariadb}
      - DB_USERNAME=${DB_USERNAME:-dockercart}
      - DB_PASSWORD=${DB_PASSWORD:-dockercart_password}
      - DB_DATABASE=${DB_DATABASE:-dockercart}
      - DB_PORT=${DB_PORT:-3306}
      - DB_PREFIX=${DB_PREFIX:-oc_}
      - DOCKERCART_URL=${DOCKERCART_URL:-http://dockercart.local}
      - DOCKERCART_HTTPS_URL=${DOCKERCART_HTTPS_URL:-http://dockercart.local}
      - DOCKERCART_SSL_ENABLED=${DOCKERCART_SSL_ENABLED:-false}
      - CACHE_ENGINE=${CACHE_ENGINE:-redis}
      - REDIS_HOSTNAME=${REDIS_HOSTNAME:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dockercart_redis_pass}
      - CACHE_PREFIX=${CACHE_PREFIX:-oc_}
      - TZ=${TZ:-UTC}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-100M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-100M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_POLL_INTERVAL=${SCHEDULER_POLL_INTERVAL:-60}
      - SCHEDULER_WORKER_TIMEOUT=${SCHEDULER_WORKER_TIMEOUT:-3600}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - dockercart-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dockercart_scheduler.php || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mariadb:
    image: mariadb:11.8
    container_name: ${MARIADB_CONTAINER_NAME:-dockercart_mariadb}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # No external port exposure - use override if needed
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-dockercart}
      MARIADB_USER: ${MARIADB_USER:-dockercart}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-dockercart_password}
      DB_PREFIX: ${DB_PREFIX:-oc_}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      DOCKERCART_URL: ${DOCKERCART_URL:-http://dockercart.local}
      TZ: ${TZ:-UTC}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/10-init.sh:z
      - ./docker/mysql/init.sql:/opt/dockercart-seed/init.sql:ro
      - ./docker/mysql/my.cnf.${MARIADB_CONFIG_SIZE:-s}:/etc/mysql/conf.d/my.cnf:ro,z
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=${MARIADB_PASSWORD:-dockercart_password} mariadb-admin ping -h localhost -u ${MARIADB_USER:-dockercart} 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dockercart-network

  # phpmyadmin:
  #   image: phpmyadmin:latest
  #   container_name: ${PHPMYADMIN_CONTAINER_NAME:-dockercart_phpmyadmin}
  #   restart: ${RESTART_POLICY:-unless-stopped}
  #   environment:
  #     PMA_HOST: ${PMA_HOST:-mariadb}
  #     PMA_PORT: ${PMA_PORT:-3306}
  #     PMA_USER: root
  #     PMA_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
  #   depends_on:
  #     - mariadb
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.${DOCKERCART_DOMAIN:-dockercart.local}`)"
  #     - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
  #     - "traefik.http.routers.phpmyadmin.tls=true"
  #     - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
  #   networks:
  #     - dockercart-network
  #     - traefik

  manticore:
    image: manticoresearch/manticore:15.1.0
    container_name: ${MANTICORE_CONTAINER_NAME:-dockercart_manticore}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./docker/manticore/manticore.conf:/etc/manticoresearch/manticore.conf:ro,z
      - ./docker/manticore/entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro,z
    tmpfs:
      - /var/lib/manticore:mode=0755,size=256M
    command:
      ["searchd", "-c", "/etc/manticoresearch/manticore.conf", "--nodetach"]
    # No ports exposed — only internal access needed
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - dockercart-network
    healthcheck:
      test:
        ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9306", "-e", "SHOW TABLES"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-dockercart_redis}
    restart: ${RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--appendonly", "no", "--save", "", "--maxmemory", "${REDIS_MAXMEMORY:-256mb}", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD:-dockercart_redis_pass}"]
    environment:
      - TZ=${TZ:-UTC}
    logging:
      driver: "none"
    networks:
      - dockercart-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ftp:
    image: fauria/vsftpd
    container_name: ${FTP_CONTAINER_NAME:-dockercart_ftp}
    profiles:
      - ftp
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TZ: ${TZ:-UTC}
      FTP_USER: ${FTP_USER:-images}
      FTP_PASS: ${FTP_PASS:-change_me_please}
      FTP_USER_HOME: /home/vsftpd/${FTP_USER:-images}
      WRITE_ENABLE: ${FTP_WRITE_ENABLE:-YES}
      ALLOW_WRITEABLE_CHROOT: ${FTP_ALLOW_WRITEABLE_CHROOT:-YES}
      LOCAL_UMASK: ${FTP_LOCAL_UMASK:-000}
      FILE_OPEN_MODE: ${FTP_FILE_OPEN_MODE:-0777}
      PASV_ADDRESS: ${FTP_PASV_ADDRESS:-127.0.0.1}
      PASV_ADDR_RESOLVE: ${FTP_PASV_ADDR_RESOLVE:-YES}
      PASV_MIN_PORT: ${FTP_PASV_MIN_PORT:-21100}
      PASV_MAX_PORT: ${FTP_PASV_MAX_PORT:-21110}
      REVERSE_LOOKUP_ENABLE: "NO"
      LOG_STDOUT: "YES"
    ports:
      - "${FTP_PORT:-21}:21"
      - "${FTP_PASV_MIN_PORT:-21100}-${FTP_PASV_MAX_PORT:-21110}:${FTP_PASV_MIN_PORT:-21100}-${FTP_PASV_MAX_PORT:-21110}"
    volumes:
      - ./upload/image:/home/vsftpd/${FTP_USER:-images}:rw
    # Fix: grant write access for the virtual FTP user (mapped to system 'ftp', uid=14).
    # The bind-mounted directory is owned by www-data (uid=33); without this the
    # 'ftp' user only has 'other' (r-x) permissions and cannot upload files.
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "chmod 777 /home/vsftpd/${FTP_USER:-images} && exec /usr/sbin/run-vsftpd.sh",
      ]
    networks:
      - dockercart-network

  # One-shot backup worker. Started by host cron via:
  #   docker compose run --rm --no-deps backup-worker
  # Never started by `make up` (profile: backup). Reuses the same image as apache/scheduler.
  backup-worker:
    profiles:
      - backup
    image: dockercart_apache:latest
    container_name: dockercart_backup_worker
    environment:
      - DOCKERCART_ROLE=backup
      - DB_HOSTNAME=${DB_HOSTNAME:-mariadb}
      - DB_USERNAME=${DB_USERNAME:-dockercart}
      - DB_PASSWORD=${DB_PASSWORD:-dockercart_password}
      - DB_DATABASE=${DB_DATABASE:-dockercart}
      - DB_PORT=${DB_PORT:-3306}
      - DB_PREFIX=${DB_PREFIX:-oc_}
      - TZ=${TZ:-UTC}
      - BACKUP_S3_ENABLED=${BACKUP_S3_ENABLED:-false}
      - BACKUP_S3_PROVIDER=${BACKUP_S3_PROVIDER:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_REGION=${BACKUP_S3_REGION:-}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY_ID:-}
      - BACKUP_S3_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_ACCESS_KEY:-}
      - BACKUP_S3_PATH=${BACKUP_S3_PATH:-dockercart/backups}
      - BACKUP_S3_RETENTION_DAYS=${BACKUP_S3_RETENTION_DAYS:-7}
      - BACKUP_S3_INSECURE=${BACKUP_S3_INSECURE:-false}
    volumes:
      - ./upload:/var/www/html:z
      - ./storage:/var/www/storage:z
    mem_limit: 1G
    cpus: "2.0"
    networks:
      - dockercart-network

volumes:
  mariadb-data:

networks:
  dockercart-network:
    name: ${DOCKERCART_NETWORK:-dockercart-network}
    driver: bridge
  traefik:
    external: true
