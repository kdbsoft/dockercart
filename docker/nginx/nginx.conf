user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Connection optimization
    keepalive_requests 100;
    reset_timedout_connection on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/json application/xml+rss 
               application/rss+xml image/svg+xml font/truetype font/opentype 
               application/vnd.ms-fontobject;
    gzip_disable "msie6";

    # Proxy cache for static files
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/dynamic levels=1:2 keys_zone=dynamic_cache:10m max_size=50m inactive=10m use_temp_path=off;

    # Proxy temp path for buffered responses (must be writable by nginx user)
    proxy_temp_path /var/cache/nginx/proxy_temp;

    # Upstream connection settings (required for keepalive)
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Proxy buffer sizes for larger responses (2MB total = can fit 1.5MB file without temp)
    proxy_buffer_size 16k;
    proxy_buffers 16 128k;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream to Apache
    upstream apache {
        server apache:80;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
