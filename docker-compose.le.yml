# Docker Compose override for standalone LE (Let's Encrypt) SSL mode
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.le.yml up -d
# Requirements:
#   - SSL_DOMAIN and SSL_EMAIL in .env
#   - Public inbound ports 80 and 443

services:
  nginx:
    ports:
      - "${DOCKERCART_HTTPS_PORT:-443}:443"
    volumes:
      - ${LETSENCRYPT_DATA_DIR:-./docker/letsencrypt}:/etc/letsencrypt:ro
      - ${LETSENCRYPT_WEBROOT_DIR:-./docker/letsencrypt/www}:/var/www/certbot:ro
      - ./docker/nginx/ssl/dockercart.ssl.conf:/etc/nginx/conf.d/dockercart.ssl.conf:ro

  certbot:
    image: certbot/certbot:latest
    container_name: ${CERTBOT_CONTAINER_NAME:-dockercart_certbot}
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      - nginx
    volumes:
      - ${LETSENCRYPT_DATA_DIR:-./docker/letsencrypt}:/etc/letsencrypt
      - ${LETSENCRYPT_WEBROOT_DIR:-./docker/letsencrypt/www}:/var/www/certbot
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap exit TERM; while :; do
          certbot renew --webroot -w /var/www/certbot --quiet --deploy-hook "nginx -s reload";
          sleep "${CERTBOT_RENEW_INTERVAL:-24h}";
        done
    networks:
      - dockercart-network
