name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  syntax:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Lint
        run: |
          find upload -type f -name "*.php" ! -path 'upload/config.php' ! -path 'upload/admin/config.php' -print0 \
            | xargs -0 -P4 php -l -n

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
          extensions: mbstring

      - name: Cache Composer & PHPStan
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.cache
          key: phpstan-${{ hashFiles('**/composer.lock') }}
          restore-keys: phpstan-

      - name: Install PHPStan
        run: composer install --no-interaction

      - name: Run PHPStan
        run: ./storage/vendor/bin/phpstan analyze -a ./storage/vendor/autoload.php --no-progress --memory-limit=512M

  cs-fixer:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2, cs2pr
          extensions: mbstring

      - name: Cache Composer & CS-Fixer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.php-cs-fixer.cache
          key: cs-fixer-${{ runner.os }}-${{ github.sha }}
          restore-keys: cs-fixer-${{ runner.os }}-

      - name: Install PHP-CS-Fixer
        run: composer require --dev --no-interaction -w php-cs-fixer/shim ^3.95

      - name: Run PHP-CS-Fixer
        run: |
          ./storage/vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle > /tmp/cs-report.xml || true
          cs2pr --graceful-warnings /tmp/cs-report.xml

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: phpunit-${{ hashFiles('**/composer.lock') }}
          restore-keys: phpunit-

      - name: Install PHPUnit
        run: composer require --dev --no-interaction phpunit/phpunit:^11.0

      - name: Run tests
        run: ./storage/vendor/bin/phpunit --no-coverage
